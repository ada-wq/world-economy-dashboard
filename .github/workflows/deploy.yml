name: Deploy World Economy Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:  # Permet un déclenchement manuel

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install dbt-bigquery==1.7.0
          pip install pytest
      
      - name: dbt compile check
        run: |
          cd world_economy
          dbt deps
          dbt compile --target dev

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      
      - name: Auth GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'
      
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
      
      - name: Deploy Cloud Functions
        run: |
          gcloud functions deploy economy-ingest-fred \
            --gen2 --runtime=python311 --region=europe-west1 \
            --source=ingestion/fred --entry-point=fetch_fred \
            --trigger-http --memory=512MB --timeout=300s \
            --no-allow-unauthenticated --project=${{ secrets.GCP_PROJECT }}
      
      - name: Run dbt production
        run: |
          cd world_economy
          dbt run --target prod
          dbt test --target prod
