name: Deploy World Economy Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dbt
        run: |
          pip install --upgrade pip
          pip install dbt-bigquery==1.7.0
      
      - name: Auth GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'
      
      - name: Create dbt profile
        run: |
          mkdir -p ~/.dbt
          echo '${{ secrets.GCP_SA_KEY }}' > /tmp/keyfile.json
          cat > ~/.dbt/profiles.yml << 'PROF'
          world_economy:
            target: dev
            outputs:
              dev:
                type: bigquery
                method: service-account
                project: world-economy-dashboard-493910
                dataset: dbt_dev
                location: EU
                threads: 4
                keyfile: /tmp/keyfile.json
          PROF
      
      - name: Run dbt debug
        run: |
          cd world_economy
          dbt debug

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dbt
        run: |
          pip install --upgrade pip
          pip install dbt-bigquery==1.7.0
      
      - name: Auth GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'
      
      - name: Create dbt profile
        run: |
          mkdir -p ~/.dbt
          echo '${{ secrets.GCP_SA_KEY }}' > /tmp/keyfile.json
          cat > ~/.dbt/profiles.yml << 'PROF'
          world_economy:
            target: prod
            outputs:
              prod:
                type: bigquery
                method: service-account
                project: world-economy-dashboard-493910
                dataset: staging
                location: EU
                threads: 4
                keyfile: /tmp/keyfile.json
          PROF
      
      - name: Run dbt
        run: |
          cd world_economy
          dbt deps
          dbt run --target prod
          dbt test --target prod
